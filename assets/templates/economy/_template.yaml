# ─── ECONOMIC RULES ──────────────────────────────────────────────────────────
rules:
  primary_currency: ""
  barter_common: true          # is bartering normal in this world?
  banking_exists: false        # organized banking/lending?
  taxation: ""                 # how taxation works
  slavery_exists: false        # is slavery part of the economy?
  guild_system: false          # do guilds control production?
  monopolies: []               # any monopolized resources?
  black_market: false          # organized illegal trade?
  magical_economy: false       # can magic be bought/sold? mana as currency?
