# Project Configuration — WorldBuilder
# This file lives at the root of each project as project.yaml

title: "{{TITLE}}"
subtitle: ""
author: ""
genre: fantasy           # fantasy | scifi | modern | campaign | custom
type: novel              # novel | series | campaign | game | worldbook
preset: fantasy          # which preset file to load

# Series info (if type is series)
series:
  name: ""
  book_number: 1
  total_planned: 1

# Story settings
pov_style: limited-third   # from genre preset options
tense: past                 # past | present
tone: []                    # dark, humorous, epic, gritty, literary, pulp, etc.
themes: []
target_word_count: 80000    # target for the full manuscript
chapter_target_words: 3000  # target per chapter

# ═══════════════════════════════════════════════════════════════════════════════
# STYLE — controls prose generation, image generation, and narration
# ═══════════════════════════════════════════════════════════════════════════════
# See templates/styles.yaml for full documentation and all options.
style:
  visual:
    preset: realistic        # realistic | painterly | anime | manga | comic-book | dark-fantasy | sci-fi-concept | cyberpunk | watercolor | woodcut | pixel-art | custom
    lighting: cinematic
    color_palette: muted
    camera: cinematic-wide
    mood: epic
    detail_level: detailed
    negative_prompt: "watermark, text, logo, signature, blurry, low quality, deformed"
  prose:
    preset: literary         # literary | pulp | young-adult | dark | gritty | epic | litrpg | cozy | horror | hard-sf | space-opera | noir | fairy-tale | custom
    pov: third-limited
    tense: past
    formality: neutral
    vocabulary: moderate
    profanity: invented-only
    content_rating: adult
    sensory_emphasis: [sight, sound, smell]
  narration:
    preset: dramatic
    character_voices: true

# World settings
calendar:
  name: ""
  epoch: ""
  format: ""

# ═══════════════════════════════════════════════════════════════════════════════
# WORLD FLAGS — fundamental rules and constraints of this world
# ═══════════════════════════════════════════════════════════════════════════════
# These are auto-populated from the genre preset but can be overridden.
# Claude uses these to stay consistent when generating content.
# The validator uses these to catch violations.
# See templates/world_flags.yaml for full documentation.
world_flags:
  reality:
    basis: secondary
    time_period: medieval
    internal_consistency: hard
    tone: []
  physics:
    earth_like: true
    cosmology: natural
    astronomy: ""
    seasons: earth-like
  magic:
    present: true
    prevalence: uncommon
    hardness: medium
    source: ""
    cost: ""
    heritability: ""
    public_knowledge: true
    divine_intervention: ""
  technology:
    level: medieval
    gunpowder: false
    printing: false
    electricity: false
    steam_power: false
    internal_combustion: false
    computing: false
    spaceflight: false
    ftl: false
    ai: false
    biotech: false
    magitech: false
    metallurgy: iron
    medicine: herbal
    communication: messenger
    transportation: horse
  society:
    governance: []
    economic_system: ""
    slavery: ""
    gender_roles: ""
    literacy: ""
    urbanization: ""
    religion: ""
  peoples:
    species_diversity: ""
    species_relations: ""
    cultural_inspiration: []
  geography:
    world_shape: globe
    world_size: ""
    known_world: ""
    biomes: []
  narrative:
    death_permanence: mostly
    power_ceiling: ""
    realism: ""
    content_rating: ""
    violence_level: ""
    language_style: ""
    anachronisms: strict

# Output settings
output:
  formats: [markdown, html]    # what to generate
  include_appendices: true
  include_character_list: true
  include_glossary: true
  include_map_placeholder: true

# AI narration settings (future)
narration:
  enabled: false
  voice_mapping: {}           # character: voice_id pairs
  narrator_voice: ""
  style: ""                   # dramatic, conversational, audiobook

# Metadata
created: ""
last_modified: ""
version: "0.2.0"
