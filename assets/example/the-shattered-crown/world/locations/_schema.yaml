# Location Schema — WorldBuilder

required:
  - name
  - type

fields:
  name:
    type: string
  aliases:
    type: list
    default: []
  type:
    type: enum
    values: [realm, continent, region, kingdom, city, town, village, district, building, room, wilderness, dungeon, ruins, temple, fortress, planet, station, ship, dimension, pocket-realm, custom]
  parent:
    type: ref
    target: locations
    description: "Parent location (e.g. kingdom for a city)"
  climate:
    type: string
  population:
    type: string
  faction:
    type: ref
    target: factions
  notable_characters:
    type: list
    items:
      type: ref
      target: characters
    default: []
  connections:
    type: list
    items:
      target:
        type: ref
        target: locations
      travel_time:
        type: string
      method:
        type: string
    default: []
  resources:
    type: list
    default: []
  dangers:
    type: list
    default: []
  first_appearance:
    type: string
  tags:
    type: list
    default: []
