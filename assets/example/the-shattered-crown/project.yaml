# Project Configuration — WorldBuilder
# This file lives at the root of each project as project.yaml

title: "The Shattered Crown"
subtitle: ""
author: ""
genre: fantasy           # fantasy | scifi | modern | campaign | custom
type: novel              # novel | series | campaign | game | worldbook
preset: fantasy          # which preset file to load

# Series info (if type is series)
series:
  name: ""
  book_number: 1
  total_planned: 1

# Story settings
pov_style: limited-third   # from genre preset options
tense: past                 # past | present
tone: []                    # dark, humorous, epic, gritty, literary, pulp, etc.
themes: []
target_word_count: 80000    # target for the full manuscript
chapter_target_words: 3000  # target per chapter

# ── STYLE ─────────────────────────────────────────────────────────────────────
style:
  visual:
    preset: realistic
    lighting: cinematic
    color_palette: muted
    camera: cinematic-wide
    mood: epic
    detail_level: detailed
    negative_prompt: "watermark, text, logo, signature, blurry, low quality, deformed, cartoon, anime"
  prose:
    preset: dark
    pov: third-limited
    tense: past
    formality: neutral
    vocabulary: moderate
    profanity: invented-only
    content_rating: adult
    sensory_emphasis: [sight, sound, smell]
  narration:
    preset: dramatic
    character_voices: true

# World settings
calendar:
  name: ""
  epoch: ""
  format: ""

# Output settings
output:
  formats: [markdown, html]    # what to generate
  include_appendices: true
  include_character_list: true
  include_glossary: true
  include_map_placeholder: true

# AI narration settings (future)
narration:
  enabled: false
  voice_mapping: {}           # character: voice_id pairs
  narrator_voice: ""
  style: ""                   # dramatic, conversational, audiobook

